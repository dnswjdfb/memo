<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Memo App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Georgia', serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #ffd1dc 0%, #ffb6d9 50%, #e8b5ce 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                    radial-gradient(circle at 20% 80%, rgba(255, 255, 255, 0.3) 0%, transparent 50%),
                    radial-gradient(circle at 80% 20%, rgba(255, 182, 193, 0.4) 0%, transparent 50%),
                    radial-gradient(circle at 40% 40%, rgba(255, 218, 224, 0.3) 0%, transparent 40%);
            pointer-events: none;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        @keyframes sparkle {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .sparkle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: radial-gradient(circle, #fff, transparent);
            border-radius: 50%;
            pointer-events: none;
            animation: sparkle 3s infinite;
        }

        .sparkle:nth-child(1) { top: 10%; left: 15%; animation-delay: 0s; }
        .sparkle:nth-child(2) { top: 20%; right: 20%; animation-delay: 0.5s; }
        .sparkle:nth-child(3) { bottom: 15%; left: 25%; animation-delay: 1s; }
        .sparkle:nth-child(4) { bottom: 25%; right: 15%; animation-delay: 1.5s; }
        .sparkle:nth-child(5) { top: 50%; left: 10%; animation-delay: 2s; }
        .sparkle:nth-child(6) { top: 40%; right: 10%; animation-delay: 2.5s; }

        .container {
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0.95), rgba(255, 240, 245, 0.95));
            width: 420px;
            padding: 50px 40px;
            border-radius: 30px;
            box-shadow:
                    0 20px 60px rgba(255, 182, 193, 0.4),
                    0 0 0 1px rgba(255, 255, 255, 0.8) inset,
                    0 8px 16px rgba(0, 0, 0, 0.1);
            text-align: center;
            position: relative;
            animation: float 6s ease-in-out infinite;
            border: 3px solid rgba(255, 192, 203, 0.3);
        }

        .container::before {
            content: '✨';
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 40px;
            animation: sparkle 2s infinite;
        }

        .container::after {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #ffc0cb, #ffb6d9, #e8b5ce, #ffc0cb);
            border-radius: 30px;
            z-index: -1;
            opacity: 0.5;
            filter: blur(10px);
        }

        h1 {
            margin-bottom: 40px;
            color: #c66b8a;
            font-size: 32px;
            font-weight: normal;
            text-shadow: 2px 2px 4px rgba(255, 182, 193, 0.3);
            letter-spacing: 2px;
            position: relative;
        }

        h1::before,
        h1::after {
            content: '♔';
            position: absolute;
            color: #f4a5c1;
            font-size: 24px;
        }

        h1::before {
            left: -35px;
            top: 50%;
            transform: translateY(-50%);
        }

        h1::after {
            right: -35px;
            top: 50%;
            transform: translateY(-50%);
        }

        .menu a {
            display: block;
            text-decoration: none;
            padding: 18px 25px;
            margin: 18px 0;
            border-radius: 20px;
            background: linear-gradient(135deg, #fff0f5 0%, #ffe4e9 100%);
            color: #c66b8a;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            border: 2px solid rgba(255, 192, 203, 0.3);
            position: relative;
            overflow: hidden;
        }

        .menu a::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 182, 193, 0.4), transparent);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .menu a:hover::before {
            width: 300px;
            height: 300px;
        }

        .menu a:hover {
            background: linear-gradient(135deg, #ffb6d9 0%, #ffc0cb 100%);
            color: #fff;
            transform: translateY(-5px) scale(1.02);
            box-shadow:
                    0 10px 25px rgba(255, 182, 193, 0.6),
                    0 0 20px rgba(255, 192, 203, 0.4);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .menu a span {
            position: relative;
            z-index: 1;
        }

        .footer {
            margin-top: 35px;
            font-size: 11px;
            color: #d4a5b8;
            font-style: italic;
            letter-spacing: 1px;
        }

        .decorative-border {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            border-radius: 30px;
            pointer-events: none;
        }

        .decorative-border::before,
        .decorative-border::after {
            content: '◆';
            position: absolute;
            color: #f4a5c1;
            font-size: 20px;
            opacity: 0.6;
        }

        .decorative-border::before {
            top: 15px;
            left: 15px;
        }

        .decorative-border::after {
            bottom: 15px;
            right: 15px;
        }
    </style>
</head>
<body>

<div class="sparkle"></div>
<div class="sparkle"></div>
<div class="sparkle"></div>
<div class="sparkle"></div>
<div class="sparkle"></div>
<div class="sparkle"></div>

<div class="container">
    <div class="decorative-border"></div>
    <h1 th:text="'Memo App'">Memo App</h1>

    <div class="menu">
        <a th:href="@{'/write'}"><span>✏️ 메모 작성</span></a>
        <a th:href="@{'/list'}"><span>📋 메모 목록</span></a>
        <a th:href="@{'/signup_form'}"><span>👤 회원가입</span></a>
    </div>

    <div class="footer">
        ♡ 2026 Memo Application ♡
    </div>
</div>

</body>
</html>
