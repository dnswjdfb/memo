<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Princess Update Form</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Nanum Myeongjo', serif;
      background: linear-gradient(135deg, #ffeef8 0%, #ffe0f0 50%, #ffd5eb 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      width: 200%;
      height: 200%;
      background-image:
              radial-gradient(circle, rgba(255, 182, 193, 0.15) 1px, transparent 1px),
              radial-gradient(circle, rgba(255, 192, 203, 0.15) 1px, transparent 1px);
      background-size: 50px 50px, 80px 80px;
      background-position: 0 0, 40px 40px;
      animation: sparkle 20s linear infinite;
    }

    @keyframes sparkle {
      0% { transform: translate(0, 0) rotate(0deg); }
      100% { transform: translate(-50px, -50px) rotate(360deg); }
    }

    .container {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 30px;
      padding: 50px 60px;
      box-shadow:
              0 20px 60px rgba(255, 105, 180, 0.3),
              0 0 0 1px rgba(255, 192, 203, 0.5),
              inset 0 1px 0 rgba(255, 255, 255, 0.9);
      max-width: 600px;
      width: 100%;
      position: relative;
      z-index: 1;
      border: 3px solid transparent;
      background-clip: padding-box;
    }

    .container::before {
      content: '';
      position: absolute;
      top: -3px;
      left: -3px;
      right: -3px;
      bottom: -3px;
      background: linear-gradient(45deg, #ff69b4, #ff1493, #ffb6c1, #ff69b4);
      border-radius: 30px;
      z-index: -1;
      opacity: 0.6;
    }

    h1 {
      color: #d946a6;
      text-align: center;
      margin-bottom: 40px;
      font-size: 2.5em;
      text-shadow: 2px 2px 4px rgba(255, 105, 180, 0.3);
      position: relative;
      display: inline-block;
      width: 100%;
    }

    h1::before,
    h1::after {
      content: '✨';
      position: absolute;
      font-size: 0.6em;
      animation: twinkle 2s ease-in-out infinite;
    }

    h1::before {
      left: 10%;
      top: -10px;
    }

    h1::after {
      right: 10%;
      top: -10px;
      animation-delay: 1s;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 25px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    label {
      color: #d946a6;
      font-weight: 700;
      font-size: 1.1em;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    label::before {
      content: '👑';
      font-size: 1.2em;
    }

    input[type="text"],
    textarea {
      padding: 15px 20px;
      border: 2px solid #ffb6c1;
      border-radius: 15px;
      font-family: 'Nanum Myeongjo', serif;
      font-size: 1em;
      background: linear-gradient(to bottom, #fff, #fffafc);
      transition: all 0.3s ease;
      outline: none;
    }

    input[type="text"]:focus,
    textarea:focus {
      border-color: #ff69b4;
      box-shadow: 0 0 0 4px rgba(255, 105, 180, 0.1);
      transform: translateY(-2px);
    }

    textarea {
      min-height: 150px;
      resize: vertical;
      font-family: 'Nanum Myeongjo', serif;
    }

    button {
      background: linear-gradient(135deg, #ff69b4 0%, #ff1493 100%);
      color: white;
      border: none;
      padding: 18px 40px;
      font-size: 1.2em;
      font-weight: 700;
      border-radius: 25px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Nanum Myeongjo', serif;
      box-shadow: 0 8px 20px rgba(255, 20, 147, 0.3);
      position: relative;
      overflow: hidden;
    }

    button::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    button:hover::before {
      width: 300px;
      height: 300px;
    }

    button:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 30px rgba(255, 20, 147, 0.4);
    }

    button:active {
      transform: translateY(-1px);
    }

    button span {
      position: relative;
      z-index: 1;
    }

    .crown-decoration {
      text-align: center;
      font-size: 3em;
      margin-bottom: 20px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @media (max-width: 600px) {
      .container {
        padding: 30px 25px;
      }

      h1 {
        font-size: 2em;
      }

      button {
        font-size: 1.1em;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="crown-decoration">👑</div>
  <h1>수정하기</h1>
  <form action="update_done" method="post">
    <input type="hidden" th:value="${idx}" name="idx">

    <div class="form-group">
      <label for="writer">작성자</label>
      <input type="text" id="writer" th:value="${dto.writer}" name="writer" placeholder="새로운 작성자명을 입력하세요">
    </div>

    <div class="form-group">
      <label for="memo">메모</label>
      <textarea id="memo" name="memo" placeholder="내용을 입력하세요..."></textarea>
    </div>

    <button type="submit">
      <span>✨ 수정하기 ✨</span>
    </button>
  </form>
</div>
</body>
</html>
